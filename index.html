    <script>  
      function TampilkanSemuaProduk() {
        $.getJSON("assets/js/productList.json", function (data) {
          let produk = data.productList;
          //console.log(menu);
          $("#daftar-produk").empty();
          $.each(produk, function (i, data) {
            //console.log(data);
            $("#daftar-produk").append(
              '<div class="card col-4 col-md-2 col-sm-3 m-3"><img src="assets/jualan/' +
              data.img +
              '" width="10rem" class="card-img-top" alt="gambar ' +
              data.title +
              '"><div class="card-body"><small class="text-dark mb-2">' +
              data.genre +
              '</small><a href="#" onclick="tampilDetail(' + data.id + ')" class="card-title" data-bs-toggle="modal" data-bs-target="#hubungikamidiig">' +
              data.title +
              '</a></div></div>'
            );
          });
        });
      }

      TampilkanSemuaProduk();

      $(".produk-kategori").on("click", function () {
        $(".produk-kategori").removeClass("active");
        $(this).addClass("active");

        let category = $(this).html();
        //   console.log(category);
        $("h1").html(category);

        if (category == "All Products") {
          TampilkanSemuaProduk();
          return;
        }

        $.getJSON("assets/js/productList.json", function (data) {
          let produk = data.productList;
          let content = "";
          let found = false;

          $.each(produk, function (i, item) {
            if (item.genre && item.genre.toLowerCase() === category.toLowerCase()) {
              found = true;
              content +=
                '<div class="card col-4 col-md-2 col-sm-3 m-3"><img src="assets/jualan/' +
                item.img +
                '" width="10rem" class="card-img-top" alt="gambar ' +
                item.title +
                '"><div class="card-body"><small class="text-dark mb-2">' +
                item.genre +
                '</small><a href="#" onclick="tampilDetail(' + item.id + ')" class="card-title" data-bs-toggle="modal" data-bs-target="#hubungikamidiig">' +
                item.title +
                '</a></div></div>';
            }
          });

          if (!found) {
            content = "<h2 class='text-center my-5 py-3'>Maaf kategori " + category + " belum tersedia</h2>";
          }

          $("#daftar-produk").html(content);
        });
      });

    </script>
    <script>
        // Fungsi untuk membuka modal dan memuat data
        function tampilDetail(idTombol) {
            // // Tampilkan modal
            // const overlay = document.getElementById('modalOverlay');
            // overlay.classList.add('active');
            // Ambil data dari file JSON
            fetch('assets/js/productList.json')
                .then(response => response.json())
                .then(data => {
                    // Cari data berdasarkan ID tombol yang diklik
                    const detail = data.productList.find(item => item.id == idTombol);
                    
                    // Tampilkan data ke dalam modal
                    const modalData = document.getElementById('modalData');
                    if (detail) {
                      document.getElementById("title").innerText = detail.title;
                      document.getElementById("harga").innerText = detail.price;
                     document.getElementById('sinopsis').setAttribute('data-id', detail.id);
                      // Mengubah atribut 'src' gambar modal secara dinamis
                      document.getElementById("img").src = `assets/jualan/${detail.img}`;
                        // modalData.innerHTML = `
                        //     <p><strong>Judul:</strong> ${detail.title}</p>
                        //     <p><strong>Genre:</strong> ${detail.genre}</p>
                        //     <p><strong>Harga:</strong> ${detail.price}</p>
                        // `;
                    } else {
                        modalData.innerHTML = `<p style="color:red;">Data tidak ditemukan!</p>`;
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('modalData').innerHTML = `<p style="color:red;">Gagal memuat data.</p>`;
                });
        }

        // Fungsi yang dieksekusi saat tombol di dalam modal diklik
function ProsesData() {
  const tombol = document.getElementById('sinopsis');
  const idData = tombol.getAttribute('data-id');
  
 // 2. Arahkan ke halaman baru dengan membawa parameter ID di URL
  window.location.href = `pages/detail.html?id=${idData}`;
}
    </script>
